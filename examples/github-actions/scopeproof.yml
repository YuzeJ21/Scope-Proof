name: ScopeProof

on:
  pull_request_target:
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pull-requests: write

env:
  # Keep this informational until confirmed dogfood validates the contract.
  SCOPEPROOF_REQUIRED_CHECK: false

jobs:
  review:
    name: ScopeProof evidence review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Install ScopeProof
        run: pip install "scopeproof @ git+https://github.com/YuzeJ21/Scope-Proof.git@f7f56cff19e2f4ed633598775263e33d29e0a961"
      - name: Review public PR evidence (informational)
        continue-on-error: true
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          echo "SCOPEPROOF_VERDICT=needs_review" >> "$GITHUB_ENV"
          echo "SCOPEPROOF_REQUIREMENTS_CONFIRMED=false" >> "$GITHUB_ENV"
          if [ -f .scopeproof/requirements.txt ] && [ -f .scopeproof/requirements-confirmation.json ]; then
            scopeproof validate-requirements-confirmation \
              --requirements .scopeproof/requirements.txt \
              --confirmation .scopeproof/requirements-confirmation.json
            echo "SCOPEPROOF_REQUIREMENTS_CONFIRMED=true" >> "$GITHUB_ENV"
            scopeproof review --pr "$PR_URL" \
              --requirements .scopeproof/requirements.txt \
              --storage-dir .scopeproof/reviews > "$RUNNER_TEMP/scopeproof-result.json"
            python -c 'import json; print("SCOPEPROOF_VERDICT=" + json.load(open("'"$RUNNER_TEMP"'/scopeproof-result.json"))["verdict"])' >> "$GITHUB_ENV"
            review_id=$(python -c 'import json; print(json.load(open("'"$RUNNER_TEMP"'/scopeproof-result.json"))["review_id"])')
            scopeproof export "$review_id" --storage-dir .scopeproof/reviews --format markdown > "$RUNNER_TEMP/scopeproof-report.md"
          fi
      - name: Upload ScopeProof report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: scopeproof-report
          path: ${{ runner.temp }}/scopeproof-report.md
          if-no-files-found: ignore
          retention-days: 7
      - name: Emit fork-safe ScopeProof summary and comment plan
        run: |
          content_args=()
          if [ -f "$RUNNER_TEMP/scopeproof-report.md" ]; then
            content_args+=(--content-file "$RUNNER_TEMP/scopeproof-report.md")
          fi
          if [ "$SCOPEPROOF_REQUIREMENTS_CONFIRMED" = "true" ]; then
            python -m scopeproof_core.github_action_runner \
              --event-path "$GITHUB_EVENT_PATH" \
              --requirements-confirmed \
              --verdict "$SCOPEPROOF_VERDICT" "${content_args[@]}"
          else
            python -m scopeproof_core.github_action_runner \
              --event-path "$GITHUB_EVENT_PATH" \
              --content "Checked-in .scopeproof/requirements.txt is missing."
          fi
      - name: Publish an idempotent informational comment
        if: github.event.pull_request.head.repo.fork == false && hashFiles('.scopeproof/requirements.txt') != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if [ "$SCOPEPROOF_REQUIREMENTS_CONFIRMED" != "true" ]; then
            echo "ScopeProof: requirements confirmation is unavailable or does not match."
            exit 0
          fi
          content_args=()
          if [ -f "$RUNNER_TEMP/scopeproof-report.md" ]; then
            content_args+=(--content-file "$RUNNER_TEMP/scopeproof-report.md")
          fi
          python -m scopeproof_core.github_action_runner \
            --event-path "$GITHUB_EVENT_PATH" \
            --requirements-confirmed \
            --verdict "$SCOPEPROOF_VERDICT" \
            --publish-comment "${content_args[@]}"
      - name: Publication boundary
        run: |
          echo "Fork pull requests never receive a write request."
          echo "Comments are informational; required-check mode remains disabled."

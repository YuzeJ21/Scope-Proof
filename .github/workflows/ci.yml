name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: python -m pytest -q
      - name: Deterministic benchmark
        run: python -m scopeproof_core.evals.runner
      - name: Installed wheel smoke
        run: |
          wheel_dir="$RUNNER_TEMP/scopeproof-wheel"
          python -m pip wheel . --no-deps --wheel-dir "$wheel_dir"
          wheel="$(find "$wheel_dir" -type f -name 'scopeproof-*.whl' -print -quit)"
          python -m pip install --force-reinstall --no-deps "$wheel"
          (cd "$RUNNER_TEMP" && scopeproof benchmark)

          web_log="$RUNNER_TEMP/scopeproof-web.log"
          web_pid=""
          cleanup() {
            if [ -n "$web_pid" ]; then
              kill -- -"$web_pid" 2>/dev/null || true
              wait "$web_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          setsid scopeproof-web --host 127.0.0.1 --port 8512 > "$web_log" 2>&1 &
          web_pid=$!

          healthy=0
          for attempt in $(seq 1 30); do
            if ! kill -0 "$web_pid" 2>/dev/null; then
              echo "Installed ScopeProof workbench exited before becoming healthy."
              cat "$web_log"
              exit 1
            fi
            if response="$(curl --fail --silent http://127.0.0.1:8512/_stcore/health 2>/dev/null)"; then
              if [ "$response" = "ok" ]; then
                healthy=1
                break
              fi
            fi
            sleep 1
          done

          if [ "$healthy" -ne 1 ]; then
            echo "Installed ScopeProof workbench did not become healthy within 30 seconds."
            cat "$web_log"
            exit 1
          fi

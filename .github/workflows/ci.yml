name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  compatibility-python-311:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"
          cache: pip
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Test
        run: python -m pytest -q
      - name: Deterministic benchmark
        run: python -m scopeproof_core.evals.runner
      - name: Installed wheel compatibility smoke
        run: |
          wheel_dir="$RUNNER_TEMP/scopeproof-wheel-python-311"
          python -m pip wheel . --no-deps --wheel-dir "$wheel_dir"
          wheel="$(find "$wheel_dir" -type f -name 'scopeproof-*.whl' -print -quit)"
          python -m pip install --force-reinstall --no-deps "$wheel"
          (cd "$RUNNER_TEMP" && python -c 'from importlib.metadata import version; from scopeproof_core import __version__; assert version("scopeproof") == __version__')
          (cd "$RUNNER_TEMP" && scopeproof --version)
          (cd "$RUNNER_TEMP" && scopeproof-web --version)

  locked-environment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install locked environment tool
        run: python -m pip install uv==0.11.29
      - name: Sync locked environment
        run: python -m uv sync --extra dev --locked
      - name: Repository contracts
        run: python -m uv run python -m pytest -q tests/test_repository_contracts.py
      - name: Deterministic benchmark
        run: python -m uv run scopeproof benchmark

  verify:
    needs: [compatibility-python-311, locked-environment]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Upgrade packaging tools
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Lint
        run: python -m ruff check .
      - name: Test
        run: >-
          python -m pytest
          --cov=scopeproof_core
          --cov=apps
          --cov-report=term-missing:skip-covered
          --cov-fail-under=95
          -q
      - name: Deterministic benchmark
        run: python -m scopeproof_core.evals.runner
      - name: Installed wheel smoke
        run: |
          wheel_dir="$RUNNER_TEMP/scopeproof-wheel"
          python -m pip wheel . --no-deps --wheel-dir "$wheel_dir"
          wheel="$(find "$wheel_dir" -type f -name 'scopeproof-*.whl' -print -quit)"
          python -m pip install --force-reinstall --no-deps "$wheel"
          (cd "$RUNNER_TEMP" && python -c 'from importlib.metadata import version; from scopeproof_core import __version__; from scopeproof_core.schemas.models import Review; review = Review(repository="acme/repo", pr_number=1, base_sha="base", head_sha="head"); assert version("scopeproof") == __version__ == review.tool_version')
          (cd "$RUNNER_TEMP" && scopeproof --version)
          (cd "$RUNNER_TEMP" && scopeproof-web --version)
          (cd "$RUNNER_TEMP" && scopeproof benchmark)

          web_log="$RUNNER_TEMP/scopeproof-web.log"
          web_pid=""
          cleanup() {
            if [ -n "$web_pid" ]; then
              kill -- -"$web_pid" 2>/dev/null || true
              wait "$web_pid" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          setsid scopeproof-web --host 127.0.0.1 --port 8512 > "$web_log" 2>&1 &
          web_pid=$!

          healthy=0
          for attempt in $(seq 1 30); do
            if ! kill -0 "$web_pid" 2>/dev/null; then
              echo "Installed ScopeProof workbench exited before becoming healthy."
              cat "$web_log"
              exit 1
            fi
            if response="$(curl --fail --silent http://127.0.0.1:8512/_stcore/health 2>/dev/null)"; then
              if [ "$response" = "ok" ]; then
                healthy=1
                break
              fi
            fi
            sleep 1
          done

          if [ "$healthy" -ne 1 ]; then
            echo "Installed ScopeProof workbench did not become healthy within 30 seconds."
            cat "$web_log"
            exit 1
          fi
